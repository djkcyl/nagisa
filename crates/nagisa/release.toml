# 门面代表全家打唯一 tag,并同步 README 安装示例的版本号。
tag = true
tag-prefix = ""
tag-message = "Release {{version}}"
pre-release-replacements = [
  { file = "../../README.md", search = 'nagisa = "[0-9][0-9.]*"', replace = 'nagisa = "{{version}}"' },
  { file = "../../README.md", search = 'nagisa = \{ version = "[0-9][0-9.]*"', replace = 'nagisa = { version = "{{version}}"' },
]
