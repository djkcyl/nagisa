name: Release

# 手动触发:Actions → Release → Run workflow,选版本级别。
# 需要仓库 secret CARGO_REGISTRY_TOKEN(crates.io 的 publish 权限 token)。

on:
  workflow_dispatch:
    inputs:
      level:
        description: 版本级别
        type: choice
        options: [minor, patch, major]
        default: minor
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: cargo release ${{ inputs.level }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-release

      - name: git 身份
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # 升版(含内部依赖约束与 README 示例)→ 提交 → 逐 crate 验证发布 → 打 tag → push。
      # 行为全部由 release.toml / crates/nagisa/release.toml 定义。
      - name: 发版
        run: cargo release ${{ inputs.level }} --execute --no-confirm
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
